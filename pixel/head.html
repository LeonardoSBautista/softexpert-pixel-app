<script src="https://www.google.com/recaptcha/enterprise.js" async defer></script>
<link rel="icon" href="https://i.ibb.co/TMqR8FsP/favicon-softexpert-1.png" />
<script>
(function(){
  // ─── STYLES ───────────────────────────────────────────────────────────────
  const injectStyles = () => {
    const style = document.createElement("style");
    style.id = "optimized-pixel-app-styles";
    style.textContent = `
      @media screen and (max-width: 700px) {
        .vtex-store-components-3-x-productDescriptionText.c-muted-1 iframe {
          width: 90vw;
        }
      }
      .error { text-align: center; }
      .vtex-login-2-x-options,
      .vtex-login-2-x-contentForm { min-width: auto !important; }
      .vtex-login-2-x-contentAlwaysWithOptions {
        flex-direction: column;
        width: 100%;
        border-radius: 10px;
      }
      .modal-overlay {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        z-index: 9998;
        display: none;
      }
      .vtex-product-specification-badges-0-x-badgeContainer.vtex-product-specification-badges-0-x-badgeContainer--payment-type.bg-base.flex.items-center.justify-center,
      .vtex-product-specification-badges-0-x-badgeContainer.vtex-product-specification-badges-0-x-badgeContainer--tipo-de-pago.bg-base.flex.items-center.justify-center {
        background-color: transparent;
      }
      .modal-layout {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        z-index: 9999;
        width: 90%; max-width: 500px;
        display: none;
      }
      .modal-layout h2, .modal-layout p {
        text-align: center;
        font-family: "Open Sans", sans-serif;
        margin: 0 0 15px;
      }
      .modal-layout p { color: #717786; }
      .modal-layout h2 { color: #4B61AA; }
      .modal-layout .fields {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .modal-layout .fields input {
        width: 90%; max-width: 400px;
        height: 40px; margin-bottom: 15px;
        border: 1px solid gray; border-radius: 5px;
        padding: 10px; font-size: 16px;
      }
      .modal-layout .fields input::placeholder { color: #999; }
      .modal-layout button#send-data {
        background-color: #3db17d; color: white;
        padding: 10px 60px; border: none;
        border-radius: 5px;
        font-family: "Open Sans", sans-serif;
        font-size: 16px; cursor: pointer;
        transition: background-color 0.3s ease;
      }
      .modal-layout button#send-data:hover { background-color: #339b6c; }
      .g-recaptcha div {
        margin-left: auto; margin-right: auto; margin-bottom: 11px;
      }
      .sucess h3 {
        color: #4b61aa; text-align: center;
        font-family: "Open Sans", sans-serif;
        margin: 0 0 15px; font-size: 22px;
      }
      form.fields { text-align: center; }
      .vtex-product-specification-badges-0-x-badgeText { white-space: pre-line; }
    `;
    document.head.appendChild(style);
  };

  // ─── MODAL HTML ───────────────────────────────────────────────────────────
  const injectModalHTML = () => {
    const modalHTML = `
      <div class="modal-overlay"></div>
      <div class="modal-layout">
        <div class="form-title">
          <h2>Preencha o formulário abaixo para solicitar seu teste grátis por 7 dias:</h2>
        </div>
        <form class="fields">
          <input type="text" placeholder="Empresa" id="business" required />
          <input type="text" placeholder="Nome" id="name" required />
          <input type="email" placeholder="E-mail Corporativo" id="email" required />
          <input type="text" placeholder="Telefone" id="phone" required />
          <input class="productid" style="display:none" type="text" placeholder="Id do Produto" id="productid" />
          <div class="g-recaptcha" data-sitekey="6LfhWLgqAAAAANP7nYodiryiCuv7Wll68H2mLbrd" data-action="LOGIN"></div>
          <button type="submit" id="send-data">Enviar</button>
        </form>
        <div style="display:none" class="sucess">
          <p>Sua solicitação foi enviada com sucesso</p>
        </div>
        <div style="display:none" class="error">
          <p>Ocorreu um erro no envio de seus dados. Tente novamente</p>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML("beforeend", modalHTML);
  };

  // ─── DYNAMIC CSS (brand color by route) ──────────────────────────────────
  const applyDynamicCSS = () => {
    const path = window.location.pathname.toLowerCase();
    const keywords = ["treinamentos", "trainings", "capacitaciones"];
    const foundKeyword = keywords.some(k => path.includes(k));
    const color = foundKeyword ? "#002080" : "#005BC7";
    let styleElement = document.getElementById("dynamic-brand-color");
    if (!styleElement) {
      styleElement = document.createElement("style");
      styleElement.id = "dynamic-brand-color";
      document.head.appendChild(styleElement);
    }
    styleElement.textContent = `
      .vtex-product-summary-2-x-element--prateleira-geral .vtex-product-summary-2-x-productBrand {
        color: ${color};
      }
    `;
  };

  // ─── SPA ROUTING INTERCEPTOR ──────────────────────────────────────────────
  // FIX: usa evento customizado "spa:navigation" em vez de disparar "popstate"
  // artificialmente, evitando conflitos com o roteador interno do VTEX Store Framework.
  const setupSPARoutingInterceptor = () => {
    const originalPushState = history.pushState;
    const originalReplaceState = history.replaceState;

    history.pushState = function() {
      originalPushState.apply(this, arguments);
      window.dispatchEvent(new CustomEvent("spa:navigation"));
    };
    history.replaceState = function() {
      originalReplaceState.apply(this, arguments);
      window.dispatchEvent(new CustomEvent("spa:replacestate"));
    };

    window.addEventListener("popstate", applyDynamicCSS);
    window.addEventListener("spa:navigation", applyDynamicCSS);
    window.addEventListener("spa:replacestate", applyDynamicCSS);

    document.body.addEventListener("click", e => {
      const link = e.target.closest("a");
      if (link && link.href && link.origin === window.location.origin) {
        setTimeout(applyDynamicCSS, 50);
      }
    });
  };

  // ─── HELPERS ──────────────────────────────────────────────────────────────
  const setPlaceholderSafe = (selector, placeholder) => {
    try {
      const el = document.querySelector(selector);
      if (el) el.placeholder = placeholder;
    } catch (e) {
      console.warn(`Erro ao definir placeholder para ${selector}:`, e);
    }
  };

  const setButtonTextSafe = (selector, text) => {
    try {
      const btn = document.querySelector(selector);
      if (btn) btn.textContent = text;
    } catch (e) {
      console.warn(`Erro ao definir texto do botão para ${selector}:`, e);
    }
  };

  // ─── MODAL LOGIC ──────────────────────────────────────────────────────────
  const setupModalLogic = () => {
    const modalLayout = document.querySelector(".modal-layout");
    const overlay = document.querySelector(".modal-overlay");
    const form = modalLayout.querySelector(".fields");
    const successMessage = modalLayout.querySelector(".sucess");
    const errorMessage = modalLayout.querySelector(".error");
    const sendDataButton = document.getElementById("send-data");
    const formTitle = modalLayout.querySelector(".form-title h2");

    if (overlay) {
      overlay.addEventListener("click", () => {
        modalLayout.style.display = "none";
        overlay.style.display = "none";
        resetModalForm();
      });
    }

    const resetModalForm = () => {
      form.reset();
      successMessage.style.display = "none";
      errorMessage.style.display = "none";
      document.getElementById("productid").value = "";
      form.style.display = "flex";
      sendDataButton.disabled = false;
      sendDataButton.innerHTML = "Enviar";
      formTitle.style.display = "block";
      if (typeof grecaptcha !== "undefined" && grecaptcha.reset) {
        grecaptcha.reset();
      }
    };

    if (form) {
      form.addEventListener("submit", async event => {
        event.preventDefault();
        if (typeof grecaptcha === "undefined" || !grecaptcha.getResponse()) {
          alert("Por favor, marque o reCAPTCHA antes de enviar.");
          return;
        }
        const requiredFields = ["business", "name", "email", "phone"];
        const allFieldsFilled = requiredFields.every(id => document.getElementById(id).value.trim() !== "");
        if (!allFieldsFilled) {
          alert("Preencha todos os dados obrigatórios.");
          return;
        }
        sendDataButton.disabled = true;
        sendDataButton.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
        const data = {
          business: document.getElementById("business").value,
          name: document.getElementById("name").value,
          mail: document.getElementById("email").value,
          productid: document.getElementById("productid").value,
          phone: document.getElementById("phone").value
        };
        try {
          const response = await fetch("https://www.aplicah.com.br/cl/softexpert/senddata.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(data).toString()
          });
          sendDataButton.disabled = false;
          sendDataButton.innerHTML = "Enviar";
          if (response.ok) {
            const result = await response.json();
            if (result.status === "error") {
              formTitle.style.display = "none";
              form.style.display = "none";
              successMessage.style.display = "none";
              let errorHtml = "";
              if (result.message === "Já existe um registro com este e-mail") {
                errorHtml = `
                  <h3 style="color:#4b61aa;font-family:'Open Sans',sans-serif;margin:0 0 15px;font-size:22px;">
                    Já existe um registro com este e-mail.
                  </h3>
                  <button id="voltarBtn" style="background-color:#3db17d;color:white;padding:10px 60px;border:none;border-radius:5px;font-family:'Open Sans',sans-serif;font-size:16px;cursor:pointer;">
                    Voltar
                  </button>
                `;
              } else if (result.message === "Informe um email corporativo") {
                errorHtml = `
                  <h3 style="color:#4b61aa;font-family:'Open Sans',sans-serif;margin:0 0 15px;font-size:22px;">
                    Por favor, informe um e-mail corporativo.
                  </h3>
                  <button id="voltarBtn" style="background-color:#3db17d;color:white;padding:10px 60px;border:none;border-radius:5px;font-family:'Open Sans',sans-serif;font-size:16px;cursor:pointer;">
                    Voltar
                  </button>
                `;
              } else {
                errorMessage.style.display = "block";
              }
              if (errorHtml) {
                errorMessage.innerHTML = errorHtml;
                errorMessage.style.display = "block";
                document.getElementById("voltarBtn").addEventListener("click", () => {
                  errorMessage.style.display = "none";
                  formTitle.style.display = "block";
                  form.style.display = "flex";
                  document.getElementById("business").value = data.business;
                  document.getElementById("name").value = data.name;
                  document.getElementById("email").value = data.mail;
                  document.getElementById("phone").value = data.phone;
                  document.getElementById("productid").value = data.productid;
                });
              }
            } else {
              formTitle.style.display = "none";
              form.style.display = "none";
              errorMessage.style.display = "none";
              successMessage.innerHTML = `
                <h3>Seus dados de acesso foram enviados para o seu e-mail!</h3>
                <p>Se precisar de ajuda entre em contato através do:
                  <a href='mailto:sestore@softexpert.com'>sestore@softexpert.com</a>
                </p>
              `;
              successMessage.style.display = "block";
            }
          } else {
            errorMessage.style.display = "block";
          }
        } catch (error) {
          console.error("Erro no envio do formulário:", error);
          sendDataButton.disabled = false;
          sendDataButton.innerHTML = "Enviar";
          errorMessage.style.display = "block";
        }
      });
    }

    const testButtonSelector = ".vtex-rich-text-0-x-wrapper.vtex-rich-text-0-x-wrapper--test-button";
    const productIdSpanSelector = ".vtex-product-specification-badges-0-x-badgeContainer--id-processo-sesuite span";

    const setupTestButton = () => {
      const testButton = document.querySelector(testButtonSelector);
      const productIdElement = document.querySelector(productIdSpanSelector);
      if (testButton && productIdElement) {
        testButton.style.display = "block";
        if (!testButton._clickEventAdded) {
          testButton.addEventListener("click", () => {
            modalLayout.style.display = "block";
            overlay.style.display = "block";
            resetModalForm();
            const productIdValue = productIdElement.textContent.trim();
            document.getElementById("productid").value = productIdValue;
          });
          testButton._clickEventAdded = true;
        }
      } else if (testButton) {
        testButton.style.display = "none";
      }
    };

    const observerConfig = { childList: true, subtree: true };
    new MutationObserver(setupTestButton).observe(document.body, observerConfig);
  };

  // ─── CONTACT FORM LANGUAGE ────────────────────────────────────────────────
  const updateContactFormLanguage = () => {
    const url = window.location.pathname;
    if (url.includes("/es/contato")) {
      setPlaceholderSafe('[id="#/properties/email-email-input"]', "Correo electrónico comercial");
      setPlaceholderSafe('[id="#/properties/nome-text-input"]', "Nombre completo");
      setPlaceholderSafe('[id="#/properties/cargo-text-input"]', "Posición");
      setPlaceholderSafe('[id="#/properties/empresa-text-input"]', "Empresa");
      setPlaceholderSafe('[id="#/properties/telefone-text-input"]', "Teléfono");
      setPlaceholderSafe('[id="#/properties/pais-text-input"]', "País");
      setPlaceholderSafe('[id="#/properties/mensagem-textarea-input"]', "Mensaje");
      setButtonTextSafe(".vtex-store-form-0-x-formSubmitButton button div", "Enviar");
    } else if (url.includes("/contato") && !url.includes("/pt/contato")) {
      setPlaceholderSafe('[id="#/properties/email-email-input"]', "Business email address");
      setPlaceholderSafe('[id="#/properties/nome-text-input"]', "Full name");
      setPlaceholderSafe('[id="#/properties/cargo-text-input"]', "Position");
      setPlaceholderSafe('[id="#/properties/empresa-text-input"]', "Business");
      setPlaceholderSafe('[id="#/properties/telefone-text-input"]', "Telephone");
      setPlaceholderSafe('[id="#/properties/pais-text-input"]', "Country");
      setPlaceholderSafe('[id="#/properties/mensagem-textarea-input"]', "Message");
      setButtonTextSafe(".vtex-store-form-0-x-formSubmitButton button div", "Send");
    }
  };

  // ─── BADGE TEXT ───────────────────────────────────────────────────────────
  // FIX: "Sou cliente e quero pagar à vista" agora limpa o badge (string vazia)
  // em vez de exibir "à vista".
  const updateBadgeText = () => {
    const skuValueElement = document.querySelector(".vtex-store-components-3-x-skuSelectorSelectorImageValue");
    if (!skuValueElement) return;
    const skuValueText = skuValueElement.textContent.trim();

    let badgeTextElement;
    if (
      skuValueText.includes("I am a SoftExpert customer") ||
      skuValueText.includes("I want to be a SoftExpert customer")
    ) {
      badgeTextElement = document.querySelector(".vtex-product-specification-badges-0-x-badgeText--monthly");
    } else if (
      skuValueText.includes("Soy cliente de SoftExpert") ||
      skuValueText.includes("Quiero ser cliente de SoftExpert")
    ) {
      badgeTextElement = document.querySelector(".vtex-product-specification-badges-0-x-badgeText--mensual");
    } else {
      badgeTextElement = document.querySelector(".vtex-product-specification-badges-0-x-badgeText--mensal");
    }

    if (badgeTextElement) {
      if (skuValueText === "Sou cliente  e quero pagar à vista") {
        badgeTextElement.textContent = ""; // FIX: não exibir nada para pagamento à vista
      } else if (
        skuValueText === "Sou cliente  e quero pagar em 12x" ||
        skuValueText === "Quero ser cliente SoftExpert (leia abaixo: Serviços inclusos)"
      ) {
        badgeTextElement.textContent = "mensal";
      } else if (skuValueText === "I am a SoftExpert customer") {
        badgeTextElement.textContent = "";
      } else if (skuValueText === "I want to be a SoftExpert customer (read below: Services included)") {
        badgeTextElement.textContent = "monthly";
      } else if (skuValueText === "Soy cliente de SoftExpert") {
        badgeTextElement.textContent = "";
      } else if (skuValueText === "Quiero ser cliente de SoftExpert (lea a continuación: Servicios incluidos)") {
        badgeTextElement.textContent = "mensual";
      }
    }
  };

  // FIX: observa document.body em vez de guardar referência ao elemento do SKU.
  // O React substitui o elemento inteiro ao trocar SKU, tornando qualquer referência
  // direta um nó morto (observer orphan). Observar o body garante que qualquer
  // mudança no DOM dispara o callback, que então re-busca o elemento pelo seletor.
  // O debounce de 150ms evita chamadas excessivas durante a renderização do React.
  const setupBadgeTextObserver = () => {
    let debounceTimer = null;
    const debouncedUpdate = () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(updateBadgeText, 150);
    };
    new MutationObserver(debouncedUpdate).observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });
    updateBadgeText();
  };

  // ─── RELATED PRODUCTS ─────────────────────────────────────────────────────
  const checkRelatedProducts = () => {
    const relatedProducts = document.querySelector(".vtex-shelf-1-x-relatedProducts");
    const flexRowRelated = document.querySelector(".vtex-flex-layout-0-x-flexRow--container-related");
    if (relatedProducts && flexRowRelated) {
      const updateVisibility = () => {
        flexRowRelated.style.display = relatedProducts.children.length === 0 ? "none" : "";
      };
      updateVisibility();
      new MutationObserver(updateVisibility).observe(relatedProducts, { childList: true, subtree: true });
    }
  };

  // ─── LOCALE RELOAD ────────────────────────────────────────────────────────
  // FIX: monitora mudança real de locale pelo usuário, mas ignora alterações
  // que ocorrem durante navegação SPA (evita reload causado pelo binding-selector
  // alterando __RUNTIME__ no meio da transição de página).
  const setupLocaleReload = () => {
    if (typeof window.__RUNTIME__ === "undefined" || !window.__RUNTIME__.culture) {
      console.warn("VTEX Runtime object not found. Locale refresh script aborted.");
      return;
    }

    let currentLocale = window.__RUNTIME__.culture.locale;
    let isNavigating = false;
    let checkIntervalId = null;

    // Marca como "em navegação" sempre que uma transição SPA ocorrer,
    // e aguarda 2s para estabilizar antes de voltar a monitorar.
    const markNavigating = () => {
      isNavigating = true;
      clearTimeout(window.__localeNavTimer);
      window.__localeNavTimer = setTimeout(() => {
        isNavigating = false;
        // Atualiza o locale base após a navegação estabilizar,
        // para não confundir a troca de rota com troca de locale.
        currentLocale = window.__RUNTIME__.culture.locale;
      }, 2000);
    };

    window.addEventListener("spa:navigation", markNavigating);
    window.addEventListener("spa:replacestate", markNavigating);
    window.addEventListener("popstate", markNavigating);

    const checkForLocaleChange = () => {
      if (isNavigating) return; // não recarregar durante transição de página
      const newLocale = window.__RUNTIME__.culture.locale;
      if (newLocale && newLocale !== currentLocale) {
        console.log(`Locale alterado de ${currentLocale} para ${newLocale}. Forçando refresh.`);
        clearInterval(checkIntervalId);
        window.location.reload();
      }
      currentLocale = newLocale;
    };

    checkIntervalId = setInterval(checkForLocaleChange, 500);
    console.log(`Refresh-on-locale-change script iniciado. Locale inicial: ${currentLocale}`);
  };

  // ─── INIT ─────────────────────────────────────────────────────────────────
  const initializePixelApp = () => {
    injectStyles();
    injectModalHTML();
    applyDynamicCSS();
    setupSPARoutingInterceptor(); // deve vir antes de setupLocaleReload
    setupModalLogic();
    setupBadgeTextObserver();

    const observerConfig = { childList: true, subtree: true };
    new MutationObserver(updateContactFormLanguage).observe(document.body, observerConfig);
    updateContactFormLanguage();

    checkRelatedProducts();
    setupLocaleReload(); // deve vir após setupSPARoutingInterceptor
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initializePixelApp);
  } else {
    initializePixelApp();
  }
})();
</script>
